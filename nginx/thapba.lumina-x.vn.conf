upstream thapba_api_upstream {
    server 127.0.0.1:2996;
    server 127.0.0.1:2997;
    server 127.0.0.1:2998;
    keepalive 64;
}

server {
    listen 80;
    server_name thapba.lumina-x.vn;

    root /var/www/gamethapba/web/dist;
    index index.html;

    location /api/ {
        proxy_pass http://thapba_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
