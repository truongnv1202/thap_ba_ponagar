services:
  db:
    image: postgres:16-alpine
    container_name: thapba-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ponagar_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ponagar_game"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ponagar_game?schema=public
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  api-2996:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 2996
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ponagar_game?schema=public
      JWT_SECRET: replace-with-a-strong-secret
    ports:
      - "127.0.0.1:2996:2996"
    restart: unless-stopped

  api-2997:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 2997
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ponagar_game?schema=public
      JWT_SECRET: replace-with-a-strong-secret
    ports:
      - "127.0.0.1:2997:2997"
    restart: unless-stopped

  api-2998:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 2998
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ponagar_game?schema=public
      JWT_SECRET: replace-with-a-strong-secret
    ports:
      - "127.0.0.1:2998:2998"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE: ""
    depends_on:
      - api-2996
      - api-2997
      - api-2998
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

volumes:
  pgdata:
